
<!DOCTYPE html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, interactive-widget=overlays-content" />
    <meta name="referrer" content="strict-origin-when-cross-origin" />
    <meta name="theme-color" content="#050B14" />
    <meta name="description" content="Secret Coach — 과학적 AI 밀착 관리 시스템. 목표를 구조화하고, AI 코치가 달성까지 함께합니다." />
    <meta property="og:title" content="Secret Coach — AI Goal Achievement System" />
    <meta property="og:description" content="Structure + AI Coach + Visualization. 목표 달성의 3가지 열쇠를 하나의 앱에서." />
    <meta property="og:type" content="website" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <title>Secret Coach — AI Goal Achievement System</title>
    <link rel="manifest" href="manifest.json" />
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            colors: {
              'deep-space': '#050B14',
              'neon-lime': '#CCFF00',
              'electric-orange': '#FF4D00',
              'glass': 'rgba(255, 255, 255, 0.05)',
              'th-base': 'var(--bg-base)',
              'th-surface': 'var(--bg-surface)',
              'th-surface-hover': 'var(--bg-surface-hover)',
              'th-elevated': 'var(--bg-elevated)',
              'th-overlay': 'var(--bg-overlay)',
              'th-card': 'var(--bg-card)',
              'th-input': 'var(--bg-input)',
              'th-header': 'var(--bg-header)',
              'th-text': 'var(--text-primary)',
              'th-text-secondary': 'var(--text-secondary)',
              'th-text-tertiary': 'var(--text-tertiary)',
              'th-text-muted': 'var(--text-muted)',
              'th-text-inverse': 'var(--text-inverse)',
              'th-accent': 'var(--accent)',
              'th-accent-hover': 'var(--accent-hover)',
              'th-accent-muted': 'var(--accent-muted)',
              'th-accent-border': 'var(--accent-border)',
              'th-border': 'var(--border)',
              'th-border-subtle': 'var(--border-subtle)',
              'th-border-strong': 'var(--border-strong)',
            },
            fontFamily: {
              display: ['Orbitron', 'sans-serif'],
              body: ['Inter', 'sans-serif'],
            },
            animation: {
              'pulse-glow': 'pulse-glow 2s cubic-bezier(0.4, 0, 0.6, 1) infinite',
              'float': 'float 3s ease-in-out infinite',
              'fade-in': 'fade-in 0.3s ease-out',
              'slide-up': 'slide-up 0.3s ease-out',
              'shake': 'shake 0.4s ease-in-out',
              'ghost-appear': 'ghost-appear 0.5s ease-out both',
              'float-slow': 'float-slow 6s ease-in-out infinite',
              'glow-pulse-slow': 'glow-pulse-slow 4s ease-in-out infinite',
              'gradient-shift': 'gradient-shift 8s ease infinite',
            },
            keyframes: {
              'pulse-glow': {
                '0%, 100%': { opacity: 1, boxShadow: '0 0 10px var(--accent)' },
                '50%': { opacity: .5, boxShadow: '0 0 20px var(--accent)' },
              },
              'float': {
                '0%, 100%': { transform: 'translateY(0)' },
                '50%': { transform: 'translateY(-10px)' },
              },
              'fade-in': {
                '0%': { opacity: 0 },
                '100%': { opacity: 1 },
              },
              'slide-up': {
                '0%': { opacity: 0, transform: 'translateY(16px)' },
                '100%': { opacity: 1, transform: 'translateY(0)' },
              },
              'shake': {
                '0%, 100%': { transform: 'translateX(0)' },
                '25%': { transform: 'translateX(-4px)' },
                '50%': { transform: 'translateX(4px)' },
                '75%': { transform: 'translateX(-4px)' },
              },
              'ghost-appear': {
                '0%': { opacity: 0, transform: 'translate(-50%, -50%) scale(0.7)' },
                '100%': { opacity: 1, transform: 'translate(-50%, -50%) scale(1)' },
              },
              'float-slow': {
                '0%, 100%': { transform: 'translateY(0)' },
                '50%': { transform: 'translateY(-20px)' },
              },
              'glow-pulse-slow': {
                '0%, 100%': { opacity: '0.3' },
                '50%': { opacity: '0.8' },
              },
              'gradient-shift': {
                '0%, 100%': { backgroundPosition: '0% 50%' },
                '50%': { backgroundPosition: '100% 50%' },
              }
            }
          },
        },
      }
    </script>
    <!-- Theme CSS variables loaded via theme.css (imported in index.tsx for Vite compatibility) -->
    <style>
      .scrollbar-hide::-webkit-scrollbar { display: none; }
      .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
  <body>
    <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>
</html>
