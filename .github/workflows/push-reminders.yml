name: Push reminders cron

# Free external scheduler for FCM reminder pushes.
# Vercel Hobby caps crons at once/day, but push-reminders needs frequent runs
# (per-slot due window). GitHub Actions on a public repo is free; the server's
# DUE_WINDOW_MINUTES absorbs the scheduler's jitter and the per-day dedupe
# prevents double sends.

on:
  schedule:
    - cron: '*/5 * * * *' # every 5 minutes (GitHub may run a few minutes late)
  workflow_dispatch: {} # allow manual trigger for testing

# Avoid overlapping runs piling up if one is slow/late.
concurrency:
  group: push-reminders
  cancel-in-progress: false

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Trigger /api/push-reminders
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          if [ -z "$CRON_SECRET" ]; then
            echo "::error::CRON_SECRET secret is not set on this repo"
            exit 1
          fi
          code=$(curl -sS -m 60 -o /tmp/body.txt -w '%{http_code}' \
            -X POST \
            -H "Authorization: Bearer $CRON_SECRET" \
            https://secretcoach.ai/api/push-reminders)
          echo "HTTP $code"
          echo "--- response body ---"
          cat /tmp/body.txt || true
          echo
          if [ "$code" != "200" ]; then
            echo "::error::push-reminders returned HTTP $code"
            exit 1
          fi
